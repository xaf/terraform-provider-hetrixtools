version: 2

project_name: go-hetrixtools

builds:
  - id: terraform-provider
    main: ./terraform-provider
    binary: terraform-provider-go-hetrixtools_v{{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: terraform-provider
    ids:
      - terraform-provider
    formats:
      - zip
    name_template: "terraform-provider-go-hetrixtools_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - none*

checksum:
  name_template: "terraform-provider-go-hetrixtools_{{ .Version }}_SHA256SUMS"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
