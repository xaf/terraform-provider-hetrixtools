version: 2

project_name: hetrixtools

builds:
  - id: terraform-provider
    dir: ./terraform-provider
    main: .
    binary: terraform-provider-hetrixtools_v{{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: terraform-provider
    ids:
      - terraform-provider
    formats:
      - zip
    name_template: "terraform-provider-hetrixtools_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - none*

checksum:
  name_template: "terraform-provider-hetrixtools_{{ .Version }}_SHA256SUMS"

signs:
  - artifacts: checksum
    args:
      - --batch
      - --yes
      - --pinentry-mode
      - loopback
      - --passphrase
      - "{{ .Env.GPG_PASSPHRASE }}"
      - --local-user
      - "{{ .Env.GPG_FINGERPRINT }}"
      - --detach-sign
      - --output
      - ${signature}
      - ${artifact}

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

after:
  hooks:
    - cmd: sh -c 'GOPROXY=https://proxy.golang.org go list -m github.com/xaf/terraform-provider-hetrixtools@v{{ .Version }} >/dev/null || true; curl -fsS "https://pkg.go.dev/fetch/github.com/xaf/terraform-provider-hetrixtools/client@v{{ .Version }}" >/dev/null || true'
