version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directories:
      - /
      - /terraform-provider
    schedule:
      interval: weekly
    groups:
      go-modules:
        patterns:
          - "*"
